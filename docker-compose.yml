services:
  selenium-chrome:
    image: selenium/standalone-chrome:4.46.0-20260707
    container_name: otc-selenium-chrome

    shm_size: 2gb

    ports:
      - "127.0.0.1:4444:4444"
      - "127.0.0.1:7900:7900"

    environment:
      SE_SCREEN_WIDTH: 1920
      SE_SCREEN_HEIGHT: 1080
      SE_NODE_MAX_SESSIONS: 1

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:4444/status | grep -Eq '\"ready\"[[:space:]]*:[[:space:]]*true'"
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: otc-minio

    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    volumes:
      - minio-data:/data

    command: server /data --console-address ":9001"

    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  minio-data: