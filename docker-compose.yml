services:
  selenium-chrome:
    image: selenium/standalone-chrome:4.46.0-20260707
    container_name: otc-selenium-chrome

    shm_size: 2gb

    ports:
      - "127.0.0.1:4444:4444"
      - "127.0.0.1:7900:7900"

    environment:
      SE_SCREEN_WIDTH: 1920
      SE_SCREEN_HEIGHT: 1080
      SE_NODE_MAX_SESSIONS: 1

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:4444/status | grep -Eq '\"ready\"[[:space:]]*:[[:space:]]*true'"
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s